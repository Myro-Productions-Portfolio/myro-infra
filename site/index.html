<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Myro Productions — Deployment Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; }
    svg { display: block; width: 100vw; height: 100vh; }

    @keyframes fadeIn   { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fadeIn45 { from { opacity: 0; } to { opacity: 0.45; } }
    @keyframes fadeIn65 { from { opacity: 0; } to { opacity: 0.65; } }
    @keyframes fadeIn80 { from { opacity: 0; } to { opacity: 0.8; } }
    @keyframes slideIn  { from { opacity: 0; transform: translateY(-10px); }
                          to   { opacity: 1; transform: translateY(0); } }

    .fi   { opacity: 0; animation-name: fadeIn;   animation-duration: 0.55s; animation-timing-function: ease; animation-fill-mode: both; }
    .fi45 { opacity: 0; animation-name: fadeIn45; animation-duration: 0.55s; animation-timing-function: ease; animation-fill-mode: both; }
    .fi65 { opacity: 0; animation-name: fadeIn65; animation-duration: 0.55s; animation-timing-function: ease; animation-fill-mode: both; }
    .fi80 { opacity: 0; animation-name: fadeIn80; animation-duration: 0.55s; animation-timing-function: ease; animation-fill-mode: both; }
    .si   { opacity: 0; animation-name: slideIn;  animation-duration: 0.45s; animation-timing-function: ease; animation-fill-mode: both; }
  </style>
</head>
<body>
<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="50%"  stop-color="#161b22"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="0" cy="0" r="1" fill="white" fill-opacity="0.015"/>
    </pattern>
    <!-- Node border glow filter -->
    <filter id="node-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <!-- Pulse dot glow filter -->
    <filter id="dot-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#dots)"/>

  <!-- ── HEADER ── -->
  <g class="si" style="animation-delay:0s">
    <text x="960" y="62"  text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#444444" letter-spacing="0.2em">DEPLOYMENT PIPELINE</text>
    <text x="960" y="100" text-anchor="middle" font-family="Inter,sans-serif" font-size="30" font-weight="700" fill="#f0f0f0">Myro Productions: <tspan fill="#4F8EF7">GitHub → Actions → AWS</tspan></text>
    <text x="960" y="127" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" fill="#555555">Push to main → Terraform formats, validates, plans → Auto-applies on merge → CloudFront delivers</text>
  </g>

  <!-- ── SECTION LABELS ── -->
  <g class="fi" style="animation-delay:0.3s">
    <text x="80"   y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="0.14em" fill="#22d3ee">SOURCE</text>
    <text x="322"  y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="0.14em" fill="#22d3ee">VERSION CONTROL</text>
    <text x="657"  y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="0.14em" fill="#22d3ee">CI / CD PIPELINE</text>
    <text x="1275" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="0.14em" fill="#22d3ee">INFRASTRUCTURE</text>
    <text x="1806" y="230" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="600" letter-spacing="0.14em" fill="#22d3ee">CLIENT</text>
  </g>

  <!-- ── SCION LINES ── -->

  <line x1="322"  y1="238" x2="322"  y2="456" class="fi45" style="animation-delay:0.40s" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 5"/>
  <line x1="657"  y1="238" x2="657"  y2="293" class="fi45" style="animation-delay:0.45s" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 5"/>
  <line x1="1275" y1="238" x2="1275" y2="376" class="fi45" style="animation-delay:0.50s" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 5"/>
  <line x1="1806" y1="238" x2="1806" y2="460" class="fi45" style="animation-delay:0.55s" stroke="#22d3ee" stroke-width="1" stroke-dasharray="4 5"/>

    <!-- glow -->
    <rect x="955" y="380" width="640" height="320" rx="12" fill="none" stroke="#FF9900" stroke-width="4" filter="url(#node-glow)" opacity="0.55"/>
    <!-- box -->
    <rect x="955" y="380" width="640" height="320" rx="12" fill="#0c0900" stroke="#FF9900" stroke-width="2" stroke-dasharray="8 5"/>
    <text x="973" y="406" font-family="Inter,sans-serif" font-size="13" font-weight="600" fill="#FF9900" opacity="0.65" letter-spacing="0.07em">AWS — us-east-1</text>
  </g>

    <!-- box (no accent bar) -->
    <rect x="492" y="297" width="330" height="486" rx="12" fill="#0d1117" stroke="#1f6feb" stroke-width="2"/>
    <text x="516" y="330" font-family="Inter,sans-serif" font-size="18" fill="#58a6ff">⚡</text>
    <text x="544" y="330" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#58a6ff">GitHub Actions</text>

    <text x="566" y="401" font-family="Inter,sans-serif" font-size="15" fill="#3a4a60">Format Check</text>
  </g>
  <line x1="657" y1="443" x2="657" y2="453" class="fi" style="animation-delay:2.1s" stroke="#1f6feb" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- STEP 2 -->
  <g class="fi" style="animation-delay:2.1s">
    <rect x="510" y="453" width="294" height="92" rx="8" fill="#0a1220" stroke="#162e58" stroke-width="1.5"/>
    <circle cx="539" cy="482" r="13" fill="#1f6feb"/>
    <text x="539" y="487" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#fff">2</text>
    <text x="566" y="481" font-family="monospace" font-size="18" font-weight="600" fill="#79b8ff">terraform validate</text>
    <text x="566" y="503" font-family="Inter,sans-serif" font-size="15" fill="#3a4a60">Syntax Check</text>
  </g>
  <line x1="657" y1="545" x2="657" y2="555" class="fi" style="animation-delay:2.3s" stroke="#d29922" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6"/>

  <!-- STEP 3 -->
  <g class="fi" style="animation-delay:2.3s">
    <rect x="510" y="555" width="294" height="92" rx="8" fill="#110e00" stroke="#3e2a00" stroke-width="1.5"/>
    <circle cx="539" cy="584" r="13" fill="#d29922"/>
    <text x="539" y="589" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#fff">3</text>
    <text x="566" y="583" font-family="monospace" font-size="18" font-weight="600" fill="#e3b341">terraform plan</text>
    <text x="566" y="605" font-family="Inter,sans-serif" font-size="15" fill="#3a4a60">Dry Run Preview</text>

  <line x1="657" y1="647" x2="657" y2="657" class="fi" style="animation-delay:2.5s" stroke="#238636" stroke-width="1.5" stroke-dasharray="2 3" opacity="0.6"/>

    <circle cx="539" cy="686" r="13" fill="#238636"/>
    <text x="539" y="691" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="700" fill="#fff">4</text>
    <text x="566" y="685" font-family="monospace" font-size="18" font-weight="600" fill="#56d364">terraform apply</text>
    <text x="566" y="707" font-family="Inter,sans-serif" font-size="15" fill="#3a4a60">Deploy to AWS</text>
    <rect x="566" y="716" width="90" height="20" rx="10" fill="#23863618" stroke="#23863644" stroke-width="1"/>
    <text x="611" y="731" text-anchor="middle" font-family="Inter,sans-serif" font-size="14" font-weight="600" fill="#238636">on merge</text>
  </g>

  <!-- ── S3 BOX ── -->

    <!-- glow -->
    <rect x="987" y="426" width="240" height="228" rx="10" fill="none" stroke="#3fb950" stroke-width="4" filter="url(#node-glow)" opacity="0.55"/>
    <!-- box -->
    <rect x="987" y="426" width="240" height="228" rx="10" fill="#08100a" stroke="#238636" stroke-width="2"/>
    <ellipse cx="1025" cy="452" rx="16" ry="6" fill="#238636" opacity="0.8"/>
    <rect x="1009" y="452" width="32" height="24" fill="#0d2010"/>
    <ellipse cx="1025" cy="476" rx="16" ry="6" fill="#163d1e" opacity="0.9"/>
    <text x="1025" y="470" text-anchor="middle" font-family="monospace" font-size="11" font-weight="700" fill="#56d364">S3</text>
    <text x="1057" y="464" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#56d364">S3 Bucket</text>
    <text x="1057" y="484" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">static site files</text>
    <rect x="1005" y="494" width="90" height="26" rx="13" fill="#1c0808" stroke="#3e1212" stroke-width="1"/>
    <text x="1050" y="512" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#f85149" letter-spacing="0.06em">PRIVATE</text>
    <text x="1005" y="542" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">access via OAC only</text>
    <text x="1005" y="562" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">no public S3 access</text>
  </g>

  <!-- ── CLOUDFRONT BOX ── -->
  <g class="fi" style="animation-delay:3.7s">
    <!-- glow -->
    <rect x="1274" y="426" width="283" height="228" rx="10" fill="none" stroke="#e3b341" stroke-width="4" filter="url(#node-glow)" opacity="0.55"/>
    <!-- box -->
    <rect x="1274" y="426" width="283" height="228" rx="10" fill="#0e0900" stroke="#d29922" stroke-width="2"/>
    <circle cx="1312" cy="466" r="20" fill="#160f00" stroke="#d29922" stroke-width="1"/>
    <ellipse cx="1312" cy="466" rx="20" ry="9" fill="none" stroke="#d29922" stroke-width="0.8" opacity="0.5"/>
    <line x1="1292" y1="466" x2="1332" y2="466" stroke="#d29922" stroke-width="0.8" opacity="0.5"/>
    <line x1="1312" y1="446" x2="1312" y2="486" stroke="#d29922" stroke-width="0.8" opacity="0.5"/>
    <text x="1344" y="464" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#e3b341">CloudFront</text>
    <text x="1344" y="484" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">HTTPS distribution</text>
    <rect x="1292" y="494" width="80" height="26" rx="13" fill="#081808" stroke="#163e1a" stroke-width="1"/>
    <text x="1332" y="512" text-anchor="middle" font-family="Inter,sans-serif" font-size="16" font-weight="700" fill="#3fb950" letter-spacing="0.06em">PUBLIC</text>
    <text x="1384" y="512" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">CDN + edge cache</text>
    <text x="1292" y="542" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">SSL/TLS · Origin Access Control</text>
    <text x="1292" y="562" font-family="Inter,sans-serif" font-size="17" fill="#8b949e">reads from S3 via OAC</text>
  </g>

  <!-- ── GITHUB BOX ── -->
  <g class="fi" style="animation-delay:1.1s">
    <!-- glow -->
    <rect x="222" y="460" width="200" height="160" rx="12" fill="none" stroke="#8b949e" stroke-width="4" filter="url(#node-glow)" opacity="0.45"/>
    <!-- box (no accent bar) -->
    <rect x="222" y="460" width="200" height="160" rx="12" fill="#161b22" stroke="#292f38" stroke-width="2"/>
    <g transform="translate(242,524) scale(2.25)" opacity="0.85">
      <path fill="#f0f0f0" fill-rule="evenodd" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
    </g>
    <text x="292" y="522" font-family="Inter,sans-serif" font-size="22" font-weight="700" fill="#f0f0f0">GitHub</text>
    <text x="292" y="540" font-family="Inter,sans-serif" font-size="16" fill="#8b949e">repository</text>
    <rect x="292" y="548" width="62" height="22" rx="11" fill="#21262d" stroke="#30363d" stroke-width="1"/>
    <text x="323" y="564" text-anchor="middle" font-family="monospace" font-size="13" fill="#8b949e">main</text>
  </g>

  <!-- ── DEVELOPER ── -->
  <g class="fi" style="animation-delay:0.6s">
    <!-- glow -->
    <circle cx="80" cy="540" r="44" fill="none" stroke="#6060bb" stroke-width="4" filter="url(#node-glow)" opacity="0.65"/>
    <!-- circle -->
    <circle cx="80" cy="540" r="42" fill="#111125" stroke="#252545" stroke-width="1.5"/>
    <circle cx="80" cy="526" r="13" fill="#2e2e58"/>
    <path d="M52 566 Q52 550 80 550 Q108 550 108 566" fill="#2e2e58"/>
    <text x="80" y="614" text-anchor="middle" font-family="Inter,sans-serif" font-size="17" font-weight="600" fill="#ccccdd">Developer</text>
    <text x="80" y="632" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#3a3a55">pushes code</text>
  </g>

  <!-- ── END USER BROWSER ── -->
  <g class="fi" style="animation-delay:4.3s">
    <!-- glow -->
    <rect x="1722" y="464" width="168" height="152" rx="10" fill="none" stroke="#8b949e" stroke-width="4" filter="url(#node-glow)" opacity="0.45"/>
    <!-- box -->
    <rect x="1722" y="464" width="168" height="152" rx="10" fill="#161b22" stroke="#292f38" stroke-width="2"/>
    <rect x="1722" y="464" width="168" height="28" rx="8" fill="#1b2028"/>
    <rect x="1722" y="481" width="168" height="11" fill="#1b2028"/>
    <circle cx="1737" cy="478" r="5" fill="#ff5f57"/>
    <circle cx="1753" cy="478" r="5" fill="#febc2e"/>
    <circle cx="1769" cy="478" r="5" fill="#28c840"/>
    <rect x="1783" y="470" width="98" height="16" rx="8" fill="#2a3040"/>
    <text x="1832" y="482" text-anchor="middle" font-family="monospace" font-size="11" fill="#484f58">https://…</text>
    <line x1="1735" y1="510" x2="1877" y2="510" stroke="#1c2330" stroke-width="10" stroke-linecap="round"/>
    <line x1="1735" y1="528" x2="1860" y2="528" stroke="#1c2330" stroke-width="10" stroke-linecap="round"/>

    <text x="1806" y="656" text-anchor="middle" font-family="Inter,sans-serif" font-size="13" fill="#3a3a55">any browser</text>

  <!-- ── SOLID ARROWS + LABELS ── -->

  <g class="fi80" style="animation-delay:0.85s">
    <line x1="126" y1="540" x2="214" y2="540" stroke="#555570" stroke-width="2.5"/>
    <polygon points="218,540 205,534 205,546" fill="#555570"/>
  </g>
  <text x="174" y="522" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="500" fill="#555570" class="fi" style="animation-delay:1.0s">push code</text>

  <!-- GH → ACT -->
  <g class="fi80" style="animation-delay:1.4s">
    <line x1="422" y1="540" x2="484" y2="540" stroke="#1f6feb" stroke-width="2.5"/>
    <polygon points="488,540 475,534 475,546" fill="#1f6feb"/>
  </g>
  <text x="457" y="522" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="500" fill="#1f6feb" class="fi" style="animation-delay:1.5s">triggers</text>

    <line x1="822" y1="540" x2="947" y2="540" stroke="#238636" stroke-width="2.5"/>

    <line x1="1227" y1="540" x2="1266" y2="540" stroke="#555570" stroke-width="2.5"/>

  <text x="1250" y="522" text-anchor="middle" font-family="Inter,sans-serif" font-size="15" font-weight="500" fill="#555570" class="fi" style="animation-delay:3.65s">OAC</text>

  <!-- AWS → USR -->
  <g class="fi80" style="animation-delay:3.9s">
    <line x1="1595" y1="540" x2="1714" y2="540" stroke="#3fb950" stroke-width="2.5"/>

  <!-- ── PULSE DOTS (looping, on top of arrows) ── -->
  <!-- DEV → GH: white -->
  <circle r="6" fill="white" filter="url(#dot-glow)">
    <animateMotion dur="1.6s" begin="1.5s" repeatCount="indefinite" path="M 126 540 L 218 540"/>
    <animate attributeName="opacity" values="0;0.3;0.3;0" keyTimes="0;0.08;0.88;1" dur="1.6s" begin="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="white">
    <animateMotion dur="1.6s" begin="1.5s" repeatCount="indefinite" path="M 126 540 L 218 540"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.6s" begin="1.5s" repeatCount="indefinite"/>
  </circle>

  <!-- GH → ACT: blue -->
  <circle r="6" fill="#4F8EF7" filter="url(#dot-glow)">
    <animateMotion dur="1.3s" begin="2.0s" repeatCount="indefinite" path="M 422 540 L 488 540"/>
    <animate attributeName="opacity" values="0;0.35;0.35;0" keyTimes="0;0.08;0.88;1" dur="1.3s" begin="2.0s" repeatCount="indefinite"/>
  </circle>
  <circle r="3" fill="#4F8EF7">
    <animateMotion dur="1.3s" begin="2.0s" repeatCount="indefinite" path="M 422 540 L 488 540"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.08;0.88;1" dur="1.3s" begin="2.0s" repeatCount="indefinite"/>
  </circle>

  <!-- ACT → AWS: green -->
